services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: eduwise
      POSTGRES_PASSWORD: eduwise
      POSTGRES_DB: eduwise
    ports:
      - "5433:5432"
    volumes:
      - eduwise_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: eduwise_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: eduwise_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: eduwise_backend
    environment:
      ENV: ${ENV:-dev}
      DATABASE_URL: postgresql+psycopg://eduwise:eduwise@db:5432/eduwise
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me_in_production}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-30}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-14}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RISK_MODEL_PATH: /app/app/ml/models/risk_model.joblib
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-eduwise}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

volumes:
  eduwise_pgdata:
  minio_data:
