services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: eduwise
      POSTGRES_PASSWORD: eduwise
      POSTGRES_DB: eduwise
    ports:
      - "5433:5432"
    volumes:
      - eduwise_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eduwise_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: eduwise_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"

  backend:
    build: ./backend
    container_name: eduwise_backend
    environment:
      ENV: dev
      DATABASE_URL: postgresql+psycopg://eduwise:eduwise@db:5432/eduwise
      JWT_SECRET: "dev_secret_change_me"
      JWT_ACCESS_MINUTES: "30"
      JWT_REFRESH_DAYS: "14"
      CORS_ORIGINS: "http://localhost:5173"
      # Model path (training data auto-detected by train_risk_model.py)
      RISK_MODEL_PATH: /app/app/ml/models/risk_model.joblib
      # MinIO
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "eduwise"
      MINIO_PUBLIC_URL: "http://localhost:9000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Mount data/ directory so training datasets are accessible and combined_training.csv can be written
      - ./data:/app/data
    depends_on:
      - db
      - redis
      - minio

volumes:
  eduwise_pgdata:
  minio_data:
